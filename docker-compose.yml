version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: olympiad-db
    environment:
      POSTGRES_DB: olympiad
      POSTGRES_USER: olympiad_user
      POSTGRES_PASSWORD: olympiad_dev_pass
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U olympiad_user -d olympiad' ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: olympiad-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olympiad-backend
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://olympiad_user:olympiad_dev_pass@postgres:5432/olympiad
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      PROCTOR_SERVICE_URL: http://proctor:5000
      PROCTOR_API_KEY: dev-proctor-key
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: olympiad-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    depends_on:
      - backend

  # ── Python Proctor Service ──
  proctor:
    build:
      context: ./proctor-service
      dockerfile: Dockerfile
    container_name: olympiad-proctor
    ports:
      - '5000:5000'
    environment:
      PROCTOR_API_KEY: dev-proctor-key
      DATABASE_URL: postgresql://olympiad_user:olympiad_dev_pass@postgres:5432/olympiad
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
