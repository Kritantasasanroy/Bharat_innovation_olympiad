version: '3.8'

services:

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: olympiad-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olympiad-backend
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── Next.js Student Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: olympiad-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    depends_on:
      - backend

  # ── Next.js Admin Frontend ──
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: olympiad-admin-frontend
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend

volumes:
  redis_data:
